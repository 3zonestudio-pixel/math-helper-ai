name: math_helper_ai
description: "Math Helper AI - Your personal AI math tutor"
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.0
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.0+2
  flutter_markdown: ^0.7.4+3
  share_plus: ^10.1.3
  shared_preferences: ^2.3.3
  http: ^1.2.2
  uuid: ^4.5.1
  flutter_animate: ^4.5.2
  flutter_math_fork: ^0.7.2
  image: ^4.3.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0C1424"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/icons/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
